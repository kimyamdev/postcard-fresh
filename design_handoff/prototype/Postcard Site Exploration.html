<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Postcard SG — Full Site Exploration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Caveat:wght@400;600&family=Staatliches&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles/tokens.css"/>
  <style>
    /* Page bar (sub-navigation between mocked screens) */
    .pagebar {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: var(--color-ink); color: var(--color-bg);
      border: 1.5px solid var(--color-ink);
      box-shadow: 4px 4px 0 var(--color-yellow);
      padding: 7px 10px;
      display: flex; gap: 4px; align-items: center;
      z-index: 100;
      font-family: var(--font-display);
      font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase;
      max-width: calc(100vw - 32px);
      flex-wrap: nowrap; justify-content: flex-start;
      overflow-x: auto; overflow-y: hidden;
      scrollbar-width: thin;
      scrollbar-color: var(--color-yellow) transparent;
    }
    .pagebar::-webkit-scrollbar { height: 4px; }
    .pagebar::-webkit-scrollbar-thumb { background: var(--color-yellow); }
    .pagebar::-webkit-scrollbar-track { background: transparent; }
    .pagebar button {
      all: unset; cursor: pointer; padding: 5px 8px;
      border: 1px solid transparent;
      color: var(--color-bg);
      white-space: nowrap; flex: 0 0 auto;
    }
    .pagebar button.is-active {
      background: var(--color-yellow); color: var(--color-ink); border-color: var(--color-bg);
    }
    .pagebar .group-label {
      padding: 0 4px; opacity: 0.55; font-size: 9px; flex: 0 0 auto; white-space: nowrap;
    }
    .pagebar .divider { width: 1px; height: 14px; background: rgba(248,246,237,0.25); margin: 0 3px; flex: 0 0 auto; }
    kbd {
      background: rgba(248,246,237,0.12);
      padding: 2px 6px; border-radius: 2px;
      font-size: 10px;
    }
    @media (max-width: 800px) {
      .pagebar { font-size: 10px; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="app/atoms.jsx"></script>
  <script type="text/babel" src="app/page-home.jsx"></script>
  <script type="text/babel" src="app/page-world-pdpa.jsx"></script>
  <script type="text/babel" src="app/page-pdp-coll.jsx"></script>
  <script type="text/babel" src="app/page-pdp-e.jsx"></script>
  <script type="text/babel" src="app/page-pdp-fg.jsx"></script>
  <script type="text/babel" src="app/page-static.jsx"></script>
  <script type="text/babel" src="app/page-subscriptions.jsx"></script>
  <script type="text/babel" src="app/page-flagship.jsx"></script>
  <script type="text/babel" src="app/page-sitemap.jsx"></script>

  <script type="text/babel">
    const PAGE_GROUPS = [
      { label: 'Map', pages: [['sitemap', 'Full map']] },
      { label: 'Top', pages: [['home', 'Home']] },
      { label: 'Worlds', pages: [['worlds-index', 'Worlds'], ['world', 'Hotel Lobby']] },
      { label: 'Product', pages: [['pdp-a', 'scent'], ['pdp-b', 'active'], ['pdp-c', 'gift'], ['pdp-d', 'deo'], ['pdp-e', 'bar'], ['pdp-f', 'wash'], ['pdp-g', 'shampoo']] },
      { label: 'Shop', pages: [['coll-type', 'type'], ['coll-gifts', 'gifts']] },
      { label: 'Story', pages: [['about', 'About'], ['membership', 'Membership'], ['subscriptions', 'Subscriptions'], ['refill', 'Refill'], ['flagship', 'Flagship'], ['corporate', 'Corporate']] },
    ];

    function App() {
      const [page, setPage] = React.useState(() => {
        const h = (location.hash || '').replace('#', '').trim();
        return h || 'sitemap';
      });

      const navigate = React.useCallback((p) => {
        setPage(p);
        history.replaceState(null, '', '#' + p);
        window.scrollTo({ top: 0, behavior: 'instant' });
      }, []);

      React.useEffect(() => {
        const onKey = (e) => {
          if (e.target && /input|textarea|select/i.test(e.target.tagName)) return;
          if (e.key === 'm' || e.key === 'M') navigate('sitemap');
          if (e.key === 'h' || e.key === 'H') navigate('home');
        };
        const onHash = () => {
          const h = (location.hash || '').replace('#', '').trim();
          if (h) setPage(h);
        };
        window.addEventListener('keydown', onKey);
        window.addEventListener('hashchange', onHash);
        return () => {
          window.removeEventListener('keydown', onKey);
          window.removeEventListener('hashchange', onHash);
        };
      }, [navigate]);

      const showChrome = page !== 'sitemap';

      const PageEl = {
        sitemap: window.SiteMap,
        home: window.Home,
        world: window.WorldPage,
        'worlds-index': window.WorldsIndex,
        'pdp-a': window.PDPA,
        'pdp-b': window.PDPB,
        'pdp-c': window.PDPC,
        'pdp-d': window.PDPD,
        'pdp-e': window.PDPE,
        'pdp-f': window.PDPF,
        'pdp-g': window.PDPG,
        'coll-type': window.CollectionType,
        'coll-gifts': window.CollectionGifts,
        about: window.About,
        membership: window.Membership,
        subscriptions: window.Subscriptions,
        refill: window.Refill,
        flagship: window.FlagshipOrchard,
        corporate: window.Corporate,
      }[page] || window.SiteMap;

      return (
        <div data-screen-label={`Page · ${page}`}>
          {showChrome && <window.TopNav navigate={navigate} current={page}/>}
          <PageEl navigate={navigate}/>
          {showChrome && <window.Footer navigate={navigate}/>}

          <div className="pagebar" role="navigation" aria-label="Page switcher">
            {PAGE_GROUPS.map((g, gi) => (
              <React.Fragment key={g.label}>
                {gi > 0 && <span className="divider"/>}
                <span className="group-label">{g.label}</span>
                {g.pages.map(([id, label]) => (
                  <button key={id}
                    className={page === id ? 'is-active' : ''}
                    onClick={() => navigate(id)}>{label}</button>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
